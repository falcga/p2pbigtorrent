{% extends "base.html" %}
{% block content %}
<h2>Доступные файлы</h2>
<table class="table">
    <thead>
        <tr>
            <th>Имя файла</th>
            <th>Размер</th>
            <th>Действие</th>
        </tr>
    </thead>
    <tbody>
        {% for file in files %}
        <tr id="file-row-{{ file.id }}">
            <td>{{ file.filename }}</td>
            <td>{{ (file.file_size / (1024*1024))|round(2) }} MB</td>
            <td>
                <button class="btn btn-primary download-btn" data-file-id="{{ file.id }}"
                        data-filename="{{ file.filename }}"
                        data-piece-count="{{ file.piece_hashes|length }}"
                        data-piece-length="{{ file.piece_length }}"
                        data-file-size="{{ file.file_size }}"
                        data-piece-hashes='{{ file.piece_hashes|tojson }}'>
                    Скачать
                </button>
                <div class="progress mt-2" style="display:none; height: 20px;">
                    <div class="progress-bar" role="progressbar" style="width: 0%;">0%</div>
                </div>
                <a class="btn btn-sm btn-success download-link" style="display:none;">Сохранить файл</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<script src="{{ url_for('static', filename='js/webrtc_peer.js') }}"></script>
<script src="{{ url_for('static', filename='js/file_downloader.js') }}"></script>
<script src="{{ url_for('static', filename='js/webtorrent_client.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const client = window.p2pClient;

        document.querySelectorAll('.download-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const fileId = parseInt(this.dataset.fileId);
                const filename = this.dataset.filename;
                const pieceCount = parseInt(this.dataset.pieceCount);
                const pieceLength = parseInt(this.dataset.pieceLength);
                const fileSize = parseInt(this.dataset.fileSize);
                const pieceHashes = JSON.parse(this.dataset.pieceHashes);

                const fileInfo = {
                    id: fileId,
                    filename: filename,
                    piece_count: pieceCount,
                    piece_length: pieceLength,
                    file_size: fileSize,
                    piece_hashes: pieceHashes
                };

                // UI элементы
                const row = document.getElementById(`file-row-${fileId}`);
                const progressDiv = row.querySelector('.progress');
                const progressBar = progressDiv.querySelector('.progress-bar');
                const downloadLink = row.querySelector('.download-link');
                const downloadBtn = this;

                downloadBtn.disabled = true;
                progressDiv.style.display = 'block';

                const downloader = client.startDownload(fileInfo, {
                    onProgress: (percent, downloaded, total) => {
                        progressBar.style.width = percent + '%';
                        progressBar.textContent = `${Math.round(percent)}% (${downloaded}/${total})`;
                    },
                    onComplete: (blob) => {
                        progressBar.textContent = '100% - Готово!';
                        downloadLink.style.display = 'inline-block';
                        downloadLink.href = URL.createObjectURL(blob);
                        downloadLink.download = filename;
                        downloadLink.textContent = 'Сохранить';
                        downloadBtn.disabled = false;
                    },
                    onPeerConnected: (peerId) => {
                        console.log('Peer connected:', peerId);
                    },
                    onPeerDisconnected: (peerId) => {
                        console.log('Peer disconnected:', peerId);
                    }
                });
            });
        });
    });
</script>
{% endblock %}
