{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Доступные файлы</h2>
</div>
<table class="table table-hover align-middle">
    <thead>
        <tr>
            <th>Имя файла</th>
            <th>Размер</th>
            <th>Действие</th>
        </tr>
    </thead>
    <tbody>
        {% for file in files %}
        <tr id="file-row-{{ file.id }}">
            <td>{{ file.display_name or file.filename }}</td>
            <td>{{ (file.file_size / (1024*1024))|round(2) }} MB</td>
            <td>
                <button class="btn btn-primary download-btn" data-file-id="{{ file.id }}"
                        data-filename="{{ file.display_name or file.filename }}"
                        data-piece-count="{{ file.get_piece_count() }}"
                        data-piece-length="{{ file.piece_length }}"
                        data-file-size="{{ file.file_size }}"
                        data-content-hash="{{ file.content_hash or '' }}"
                        data-piece-hashes='{{ file.get_piece_hashes_list()|tojson }}'>
                    Скачать
                </button>
                <div class="progress mt-2" style="display:none; height: 20px;">
                    <div class="progress-bar" role="progressbar" style="width: 0%;">0%</div>
                </div>
                <div class="small mt-2 checksum-status text-muted"></div>
                <a class="btn btn-sm btn-success download-link" style="display:none;">Сохранить файл</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<script src="{{ url_for('static', filename='js/webrtc_peer.js') }}"></script>
<script src="{{ url_for('static', filename='js/file_downloader.js') }}"></script>
<script src="{{ url_for('static', filename='js/webtorrent_client.js') }}"></script>
<script src="{{ url_for('static', filename='js/index_page.js') }}"></script>
{% endblock %}
